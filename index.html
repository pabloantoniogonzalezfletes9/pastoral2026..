<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastoral Juvenil - Entrada</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    
    <nav>
        <button id="btnNavAsistencia" class="active" onclick="cambiarPantalla('asistencia')"> Iniciar Sesión / Asistencia</button>
        <button id="btnNavRegistro" onclick="cambiarPantalla('registro')">Registrarse (1ra Vez)</button>
        <button id="btnNavLista" onclick="cambiarPantalla('lista')">Quiénes Vinieron</button>
    </nav>

    <div class="container">
        
       
        <div id="mensaje"></div>

        
        <div id="sec-asistencia" class="seccion active">
            <div class="login-box">
                <!-- LOGO COLOCADO AQUÍ -->
                <div class="avatar-icon">
                    <img src="WhatsApp Image 2026-06-15 at 6.24.04 PM.jpeg" alt="">
                </div>
                <h2>Encuentro Pastoral Jesus Nazareno</h2>
                <p class="login-subtitle">Ingresa tu código único de 4 dígitos para ingresar</p>
                
                <form id="formAutoasistencia">
                    <div class="form-group">
                        <input type="text" id="codigoAsistencia" placeholder="0 0 0 0" maxlength="4" autocomplete="off" required>
                    </div>
                    <button type="submit" class="btn-submit btn-login">Marcar Mi Asistencia </button>
                </form>
            </div>
        </div>

        <!-- PANTALLA 2: REGISTRO POR PRIMERA VEZ (CON EDAD) -->
        <div id="sec-registro" class="seccion">
            <h2>Inscripción Inicial</h2>
            <form id="formRegistroJoven">
                <div class="form-group">
                    <label for="nombreRegistro">Introduce tu Nombre Completo:</label>
                    <input type="text" id="nombreRegistro" placeholder="Ej: pepito perez" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="edadRegistro">Introduce tu Edad:</label>
                    <input type="number" id="edadRegistro" placeholder="Ej: 16" min="1" max="99" required style="width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; text-align: center;">
                </div>
                <button type="submit" class="btn-submit" style="background-color: #3498db;">Obtener mi Código Único </button>
            </form>
        </div>

        <!-- PANTALLA 3: VER ASISTENTES DE HOY (PROTEGIDO) -->
        <div id="sec-lista" class="seccion">
            <h2> Asistentes de Hoy</h2>
            <ul id="listaUsuarios" class="lista-asistencia">
                <!-- Se cargará dinámicamente si la clave es correcta -->
            </ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
